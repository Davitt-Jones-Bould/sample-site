<!DOCTYPE html>
<html lang="en">

<style>

  /* Tweaks panel */

<body>
<div id="root"></div>

<div id="tweaks-panel">

    <input type="color" id="tweak-accent" value="#4a7fa5">
  </div>
  <div class="tweak-row">

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#4a7fa5",
  "heroStyle": "dark",
  "density": 1
}/*EDITMODE-END*/;

// ─── DJB Logo ────────────────────────────────────────────────────────────────
const DJBLogo = ({ height = 36, light = true }) => (
  <img
    src={light ? 'uploads/whiteLogo.png' : 'uploads/logo.png'}
    alt="Davitt Jones Bould"
    style={{ height, width: 'auto', display: 'block' }}
  />
);

// ─── Navigation ─────────────────────────────────────────────────────────────
const NAV_LINKS = ['OUR PRODUCTS', 'HOW IT WORKS', 'WHO WE ARE', 'INSIGHTS', 'CONTACT'];
const SECTION_IDS = ['what-we-do', 'technology', 'use-cases', 'insights', 'contact'];

const Nav = ({ scrolled, accent }) => {
  const [menuOpen, setMenuOpen] = useState(false);
  const [activeSection, setActiveSection] = useState(0);

  useEffect(() => {
    const handleScroll = () => {
      const sections = SECTION_IDS.map(id => document.getElementById(id));
      const scrollPos = window.scrollY + 120;
      sections.forEach((sec, i) => {
        if (sec && sec.offsetTop <= scrollPos) setActiveSection(i);
      });
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
    setMenuOpen(false);
  };

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
      background: scrolled ? 'rgba(28,43,58,0.97)' : '#1c2b3a',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      boxShadow: scrolled ? '0 2px 24px rgba(0,0,0,0.25)' : 'none',
      transition: 'all 0.3s ease',
    }}>
      {/* Top bar: logo + wordmark */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 48px', borderBottom: '1px solid rgba(255,255,255,0.08)',
        height: 56,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer' }}
             onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
          <DJBLogo height={34} light={true}/>
          <div style={{
            fontSize: 10, letterSpacing: '0.22em', fontWeight: 700,
            color: accent, borderLeft: `1px solid ${accent}55`,
            paddingLeft: 14, lineHeight: 1,
          }}>LEGALTECH</div>
        </div>
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', letterSpacing: '0.08em' }}>
          POWERED BY <span style={{ color: accent, fontWeight: 600 }}>DJB</span>
        </div>
      </div>

      {/* Nav links */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 40,
        height: 44, padding: '0 48px',
      }}>
        {NAV_LINKS.map((link, i) => (
          <button key={link} onClick={() => scrollTo(SECTION_IDS[i])}
            style={{
              background: 'none', border: 'none', cursor: 'pointer',
              color: activeSection === i ? '#fff' : 'rgba(255,255,255,0.55)',
              fontSize: 10, letterSpacing: '0.18em', fontFamily: 'Raleway, sans-serif',
              fontWeight: 600, padding: '4px 0', position: 'relative',
              transition: 'color 0.2s',
              borderBottom: activeSection === i ? `2px solid ${accent}` : '2px solid transparent',
            }}>
            {link}
          </button>
        ))}
      </div>
    </nav>
  );
};

        <div style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button
            onClick={() => { const el = document.getElementById('what-we-do'); if(el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); }}

              textTransform: 'uppercase', borderRadius: 2,
              transition: 'all 0.2s',
            }}
            onMouseEnter={e => e.currentTarget.style.opacity='0.85'}
            onMouseLeave={e => e.currentTarget.style.opacity='1'}
          >
            See Our Products

            onClick={() => { const el = document.getElementById('contact'); if(el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); }}

              background: 'transparent', color: '#fff',
              border: '1px solid rgba(255,255,255,0.3)',
              padding: '14px 32px', fontSize: 11, letterSpacing: '0.18em',

          ['30+', 'Years of Real Estate Law'],
          ['UK\'s largest', 'Specialist Real Estate Law Firm'],
          ['75+ lawyers', '4 offices across the UK'],
          ['25+ years', 'Trusted by leading clients'],

          <div key={stat} style={{
            padding: '20px 44px',

            <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.13em', textTransform: 'uppercase', marginTop: 4 }}>{label}</div>
          </div>
        ))}
      </div>
    </section>
  );
};

// ─── App ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [scrolled, setScrolled] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Tweaks integration
  useEffect(() => {
    const listen = () => {};
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    document.getElementById('tweak-accent').addEventListener('input', e => {
      const v = e.target.value;
      setTweaks(t => ({ ...t, accentColor: v }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: v } }, '*');
    });
    document.getElementById('tweak-hero').addEventListener('change', e => {
      const v = e.target.value;
      setTweaks(t => ({ ...t, heroStyle: v }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { heroStyle: v } }, '*');
    });
    document.getElementById('tweak-density').addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      setTweaks(t => ({ ...t, density: v }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { density: v } }, '*');
    });
  }, []);

  const accent = tweaks.accentColor;

  return (
    <>
      <Nav scrolled={scrolled} accent={accent}/>
      <Hero accent={accent} heroStyle={tweaks.heroStyle}/>
      <WhatWeDo accent={accent} density={tweaks.density}/>
      <Technology accent={accent} density={tweaks.density}/>
      <UseCases accent={accent} density={tweaks.density}/>
      <Insights accent={accent} density={tweaks.density}/>
      <Contact accent={accent}/>
      <Footer accent={accent}/>
    </>
  );
};
